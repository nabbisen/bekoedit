name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  ELOC_LIMIT: 500

jobs:
  lint:
    name: Format & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - name: Install WebView deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libxdo-dev libssl-dev
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - name: ELOC compliance check
        shell: bash
        run: |
          OVER=""
          while IFS= read -r f; do
            n=$(grep -vc "^[[:space:]]*$\|^[[:space:]]*//" "$f" 2>/dev/null || echo 0)
            if [ "$n" -gt "$ELOC_LIMIT" ]; then
              OVER="${OVER}${n} ${f}"$'\n'
            fi
          done < <(find crates -name "*.rs" -type f)
          if [ -n "$OVER" ]; then
            echo "Files over ${ELOC_LIMIT} ELOC:"
            printf "%s" "$OVER"
            exit 1
          fi

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test  # default-members only (headless, no GUI deps)

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-audit --version 0.22.2 --locked
      - run: cargo audit

  build-and-smoke:
    name: Build + smoke test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Install WebView deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libxdo-dev libssl-dev xvfb
      - name: Install JS dependencies
        run: cd crates/bekoedit-app/js && npm ci
      - name: Test source-editor JavaScript adapter
        run: cd crates/bekoedit-app/js && npm test
      - name: Build JS bundle
        run: cd crates/bekoedit-app/js && node build.mjs
      - name: Test desktop application
        run: cargo test -p bekoedit
      - name: Build desktop app
        run: cargo build -p bekoedit --release
      - name: Smoke test (headless launch, exit 0 within 10 s)
        run: |
          # Verify the binary starts and exits cleanly in a headless display.
          # Uses xvfb-run to provide a virtual framebuffer on CI.
          timeout 10 xvfb-run -a ./target/release/bekoedit --headless-smoke
      - name: WebView lifecycle regression (RFC-041)
        run: |
          SMOKE_PARENT="$(mktemp -d "$RUNNER_TEMP/bekoedit-webview-smoke.XXXXXX")"
          trap 'rm -rf "$SMOKE_PARENT"' EXIT
          timeout 30 xvfb-run -a -s "-screen 0 1280x1024x24" \
            env NO_AT_BRIDGE=1 WEBKIT_DISABLE_COMPOSITING_MODE=1 \
            ./target/release/bekoedit \
            --webview-smoke "$SMOKE_PARENT/bekoedit-webview-smoke-profile"
      - name: Check binary links and size
        run: |
          file target/release/bekoedit
          du -sh target/release/bekoedit
