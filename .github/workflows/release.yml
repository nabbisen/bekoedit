name: Release

# RFC-024/025: version-appended source+binary archives on tag push.
on:
  push:
    tags: ["[0-9]+.[0-9]+.[0-9]+"]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build release archive (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            runner_os: Linux
            runner_arch: X64
            target: x86_64-unknown-linux-gnu
            binary: target/x86_64-unknown-linux-gnu/release/bekoedit
            archive_suffix: .tar.gz
          - os: macos-latest
            runner_os: macOS
            runner_arch: ARM64
            target: aarch64-apple-darwin
            binary: target/aarch64-apple-darwin/release/bekoedit
            archive_suffix: .tar.gz
          - os: windows-latest
            runner_os: Windows
            runner_arch: X64
            target: x86_64-pc-windows-msvc
            binary: target/x86_64-pc-windows-msvc/release/bekoedit.exe
            archive_suffix: .zip
    env:
      TARGET: ${{ matrix.target }}
      EXPECTED_RUNNER_OS: ${{ matrix.runner_os }}
      EXPECTED_RUNNER_ARCH: ${{ matrix.runner_arch }}
      BINARY_PATH: ${{ matrix.binary }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable action snapshot
        with:
          toolchain: 1.88.0
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2, peeled commit
        with:
          key: ${{ matrix.target }}
      - name: Verify native runner, compiler, and installed target
        shell: bash
        run: |
          set -euo pipefail
          test "$RUNNER_OS" = "$EXPECTED_RUNNER_OS"
          test "$RUNNER_ARCH" = "$EXPECTED_RUNNER_ARCH"
          RUSTC_VERBOSE="$(rustc +1.88.0 -vV)"
          printf '%s\n' "$RUSTC_VERBOSE"
          RUSTC_HOST="$(printf '%s\n' "$RUSTC_VERBOSE" | sed -n 's/^host: //p')"
          test "$RUSTC_HOST" = "$TARGET"
          rustup target list --installed --toolchain 1.88.0
          rustup target list --installed --toolchain 1.88.0 | grep -Fx "$TARGET"
      - run: cargo +1.88.0 metadata --locked --format-version 1
      - name: Install WebView deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libxdo-dev
      - name: Test native target
        shell: bash
        run: cargo +1.88.0 test --locked --target "$TARGET"
      - name: Build native target
        shell: bash
        run: cargo +1.88.0 build -p bekoedit --release --locked --target "$TARGET"
      - name: Inspect Linux executable architecture
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          test -f "$BINARY_PATH"
          file "$BINARY_PATH"
          HEADER="$(readelf -h "$BINARY_PATH")"
          printf '%s\n' "$HEADER"
          printf '%s\n' "$HEADER" | grep -Eq '^[[:space:]]*Class:[[:space:]]+ELF64$'
          printf '%s\n' "$HEADER" | grep -Eq '^[[:space:]]*Machine:[[:space:]]+Advanced Micro Devices X86-64$'
      - name: Inspect macOS executable architecture
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          test -f "$BINARY_PATH"
          file "$BINARY_PATH"
          ARCHS="$(lipo -archs "$BINARY_PATH")"
          printf 'architectures: %s\n' "$ARCHS"
          test "$ARCHS" = "arm64"
      - name: Inspect Windows executable architecture
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          if (-not (Test-Path -LiteralPath $env:BINARY_PATH -PathType Leaf)) {
            throw "release binary is missing: $env:BINARY_PATH"
          }
          Get-Item -LiteralPath $env:BINARY_PATH | Format-List FullName,Length
          $headers = & llvm-readobj --file-headers $env:BINARY_PATH 2>&1
          if ($LASTEXITCODE -ne 0) {
            throw "llvm-readobj failed for $env:BINARY_PATH"
          }
          $headers | ForEach-Object { Write-Output $_ }
          if (($headers -join "`n") -notmatch '(?m)^\s*Machine:\s*IMAGE_FILE_MACHINE_AMD64\s*\(0x8664\)\s*$') {
            throw "unexpected PE/COFF machine for $env:BINARY_PATH"
          }
      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$GITHUB_REF_NAME"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "invalid bare SemVer tag: $VERSION" >&2
            exit 1
          fi
          NAME="bekoedit-${VERSION}-${TARGET}"
          mkdir -p stage
          cp "$BINARY_PATH" stage/bekoedit
          cp README.md LICENSE NOTICE CHANGELOG.md stage/
          tar -C stage -czf "${NAME}.tar.gz" bekoedit README.md LICENSE NOTICE CHANGELOG.md
          shasum -a 256 "${NAME}.tar.gz" > "${NAME}.tar.gz.sha256"
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = $env:GITHUB_REF_NAME
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "invalid bare SemVer tag: $version"
          }
          $name = "bekoedit-$version-$env:TARGET"
          New-Item -ItemType Directory -Path "stage" -Force | Out-Null
          Copy-Item -LiteralPath $env:BINARY_PATH -Destination "stage/bekoedit.exe"
          Copy-Item README.md,LICENSE,NOTICE,CHANGELOG.md "stage/"
          Compress-Archive -Path "stage/*" -DestinationPath "$name.zip"
          $hash = Get-FileHash "$name.zip" -Algorithm SHA256
          "$($hash.Hash.ToLower())  $name.zip" | Set-Content -Encoding ascii "$name.zip.sha256"
      - name: Confirm committed lockfile is unchanged
        run: git diff --exit-code -- Cargo.lock
      - name: Upload target archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-${{ matrix.target }}
          path: |
            bekoedit-${{ github.ref_name }}-${{ matrix.target }}${{ matrix.archive_suffix }}
            bekoedit-${{ github.ref_name }}-${{ matrix.target }}${{ matrix.archive_suffix }}.sha256
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Verify and publish complete release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      EXPECTED_VERSION: ${{ github.ref_name }}
      ARTIFACT_DIR: dist
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable action snapshot
        with:
          toolchain: 1.88.0
      - name: Validate tag, commit, workspace versions, and changelog
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "$EXPECTED_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "invalid bare SemVer tag: $EXPECTED_VERSION" >&2
            exit 1
          fi
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          METADATA="$RUNNER_TEMP/bekoedit-release-metadata.json"
          cargo +1.88.0 metadata --locked --no-deps --format-version 1 > "$METADATA"
          python3 - "$EXPECTED_VERSION" "$METADATA" <<'PY'
          import json
          import pathlib
          import sys

          expected_version, metadata_path = sys.argv[1:]
          metadata = json.loads(pathlib.Path(metadata_path).read_text())
          members = set(metadata["workspace_members"])
          packages = [package for package in metadata["packages"] if package["id"] in members]
          expected_names = {
              "bekoedit",
              "bekoedit-core",
              "bekoedit-fs",
              "bekoedit-markdown",
              "bekoedit-ui-contract",
          }
          names = [package["name"] for package in packages]
          if len(packages) != 5 or set(names) != expected_names or len(names) != len(set(names)):
              raise SystemExit(f"unexpected workspace packages: {sorted(names)}")
          wrong = sorted(
              f'{package["name"]}={package["version"]}'
              for package in packages
              if package["version"] != expected_version
          )
          if wrong:
              raise SystemExit(f"workspace version mismatch: {wrong}")
          PY
          python3 - "$EXPECTED_VERSION" CHANGELOG.md <<'PY'
          import pathlib
          import re
          import sys

          version, changelog_path = sys.argv[1:]
          changelog = pathlib.Path(changelog_path).read_text()
          pattern = rf"^## \[{re.escape(version)}\] - \d{{4}}-\d{{2}}-\d{{2}}$"
          if not re.search(pattern, changelog, re.MULTILINE):
              raise SystemExit(f"CHANGELOG.md has no dated {version} heading")
          PY
          git diff --exit-code -- Cargo.lock
      - name: Download all target archives
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          pattern: release-*
          path: dist
          merge-multiple: true
      - name: Verify complete release artifact set
        shell: bash
        run: bash scripts/check-release-artifacts.sh "$EXPECTED_VERSION" "$ARTIFACT_DIR"
      - name: Publish verified release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            dist/bekoedit-${{ env.EXPECTED_VERSION }}-x86_64-unknown-linux-gnu.tar.gz
            dist/bekoedit-${{ env.EXPECTED_VERSION }}-x86_64-unknown-linux-gnu.tar.gz.sha256
            dist/bekoedit-${{ env.EXPECTED_VERSION }}-aarch64-apple-darwin.tar.gz
            dist/bekoedit-${{ env.EXPECTED_VERSION }}-aarch64-apple-darwin.tar.gz.sha256
            dist/bekoedit-${{ env.EXPECTED_VERSION }}-x86_64-pc-windows-msvc.zip
            dist/bekoedit-${{ env.EXPECTED_VERSION }}-x86_64-pc-windows-msvc.zip.sha256
