name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  ELOC_LIMIT: 500

jobs:
  lint:
    name: Format & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable action snapshot
        with:
          toolchain: 1.88.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2, peeled commit
      - name: Validate package MSRV metadata
        shell: bash
        run: |
          set -euo pipefail
          METADATA="$RUNNER_TEMP/bekoedit-metadata.json"
          cargo +1.88.0 metadata --locked --no-deps --format-version 1 > "$METADATA"
          python3 - "$METADATA" <<'PY'
          import json
          import pathlib
          import sys

          metadata = json.loads(pathlib.Path(sys.argv[1]).read_text())
          members = set(metadata["workspace_members"])
          actual = {
              package["name"]: package.get("rust_version")
              for package in metadata["packages"]
              if package["id"] in members
          }
          expected = {
              "bekoedit": "1.88",
              "bekoedit-core": "1.88",
              "bekoedit-fs": None,
              "bekoedit-markdown": "1.88",
              "bekoedit-ui-contract": None,
          }
          if actual != expected:
              raise SystemExit(f"workspace MSRV metadata mismatch: {actual!r}")
          print(f"workspace MSRV metadata: {actual!r}")
          PY
      - run: cargo +1.88.0 fmt --all -- --check
      - name: Install WebView deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libxdo-dev libssl-dev
      - run: cargo +1.88.0 clippy --workspace --all-targets --locked -- -D warnings
      - run: git diff --exit-code -- Cargo.lock
      - name: ELOC compliance check
        shell: bash
        run: |
          OVER=""
          while IFS= read -r f; do
            n=$(grep -vc "^[[:space:]]*$\|^[[:space:]]*//" "$f" 2>/dev/null || echo 0)
            if [ "$n" -gt "$ELOC_LIMIT" ]; then
              OVER="${OVER}${n} ${f}"$'\n'
            fi
          done < <(find crates -name "*.rs" -type f)
          if [ -n "$OVER" ]; then
            echo "Files over ${ELOC_LIMIT} ELOC:"
            printf "%s" "$OVER"
            exit 1
          fi

  fs-msrv:
    name: Filesystem crate (Rust 1.85)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable action snapshot
        with:
          toolchain: 1.85.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2, peeled commit
        with:
          key: fs-msrv-1.85
      - name: Record exact compiler
        run: rustc +1.85.0 -vV
      - name: Validate filesystem package metadata
        shell: bash
        run: |
          set -euo pipefail
          METADATA="$RUNNER_TEMP/bekoedit-fs-metadata.json"
          cargo +1.85.0 metadata --locked --no-deps --format-version 1 > "$METADATA"
          python3 - "$METADATA" <<'PY'
          import json
          import pathlib
          import sys

          metadata = json.loads(pathlib.Path(sys.argv[1]).read_text())
          members = set(metadata["workspace_members"])
          matches = [
              package
              for package in metadata["packages"]
              if package["id"] in members and package["name"] == "bekoedit-fs"
          ]
          if len(matches) != 1:
              raise SystemExit(f"expected one workspace bekoedit-fs package, got {len(matches)}")
          if matches[0].get("rust_version") is not None:
              raise SystemExit(
                  f"bekoedit-fs unexpectedly declares rust_version: {matches[0].get('rust_version')!r}"
              )
          print("bekoedit-fs has no new Cargo-enforced rust_version")
          PY
      - run: cargo +1.85.0 test -p bekoedit-fs --locked
      - run: git diff --exit-code -- Cargo.lock

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable action snapshot
        with:
          toolchain: 1.88.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2, peeled commit
      - run: cargo +1.88.0 metadata --locked --format-version 1
      - name: Record exact compiler
        run: rustc +1.88.0 -vV
      - name: Preflight macOS release inspection tool
        if: runner.os == 'macOS'
        shell: bash
        run: xcrun --find lipo
      - name: Preflight Windows release inspection tool
        if: runner.os == 'Windows'
        shell: pwsh
        run: Get-Command llvm-readobj | Format-List Name,Source
      - run: cargo +1.88.0 test --locked # default-members only (headless, no GUI deps)
      - name: Build desktop application at MSRV
        if: runner.os == 'macOS' || runner.os == 'Windows'
        run: cargo +1.88.0 build -p bekoedit --locked
      - run: git diff --exit-code -- Cargo.lock

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable action snapshot
        with:
          toolchain: 1.88.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2, peeled commit
      - run: cargo +1.88.0 metadata --locked --format-version 1
      - run: cargo +1.88.0 install cargo-audit --version 0.22.2 --locked
      - run: cargo +1.88.0 audit
      - run: git diff --exit-code -- Cargo.lock

  build-and-smoke:
    name: Build + smoke test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable action snapshot
        with:
          toolchain: 1.88.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2, peeled commit
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '24'
      - run: cargo +1.88.0 metadata --locked --format-version 1
      - name: Preflight Linux release inspection tool
        run: |
          command -v readelf
          readelf --version
      - name: Install WebView deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libxdo-dev libssl-dev xvfb
      - name: Install JS dependencies
        run: cd crates/bekoedit-app/js && npm ci
      - name: Test source-editor JavaScript adapter
        run: cd crates/bekoedit-app/js && npm test
      - name: Build JS bundle
        run: cd crates/bekoedit-app/js && node build.mjs
      - name: Check committed JS bundles are current
        run: git diff --exit-code -- crates/bekoedit-app/assets/editor-bundle.js crates/bekoedit-app/assets/focus-guard-bundle.js
      - name: Test desktop application
        run: cargo +1.88.0 test -p bekoedit --locked
      - name: Build desktop app
        run: cargo +1.88.0 build -p bekoedit --release --locked
      - run: git diff --exit-code -- Cargo.lock
      - name: Smoke test (headless launch, exit 0 within 10 s)
        run: |
          # Verify the binary starts and exits cleanly in a headless display.
          # Uses xvfb-run to provide a virtual framebuffer on CI.
          timeout 10 xvfb-run -a ./target/release/bekoedit --headless-smoke
      - name: WebView lifecycle regression (RFC-041)
        run: |
          SMOKE_PARENT="$(mktemp -d "$RUNNER_TEMP/bekoedit-webview-smoke.XXXXXX")"
          trap 'rm -rf "$SMOKE_PARENT"' EXIT
          timeout 60 xvfb-run -a -s "-screen 0 1280x1024x24" \
            env NO_AT_BRIDGE=1 WEBKIT_DISABLE_COMPOSITING_MODE=1 \
            ./target/release/bekoedit \
            --webview-smoke "$SMOKE_PARENT/bekoedit-webview-smoke-profile"
      - name: Check binary links and size
        run: |
          file target/release/bekoedit
          du -sh target/release/bekoedit
