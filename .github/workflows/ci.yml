name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Format & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - name: Install WebView deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libxdo-dev libssl-dev
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - name: ELOC compliance check
        run: |
          OVER=$(find crates -name "*.rs" | while read f; do
            n=$(grep -vc "^\s*$\|^\s*//" "$f" 2>/dev/null || echo 0)
            [ "$n" -gt 500 ] && echo "$n $f"
          done)
          if [ -n "$OVER" ]; then echo "Files over 500 ELOC:"; echo "$OVER"; exit 1; fi

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test  # default-members only (headless, no GUI deps)

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-audit --version 0.22.2 --locked
      - run: cargo audit

  build-and-smoke:
    name: Build + smoke test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Install WebView deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libxdo-dev libssl-dev xvfb
      - name: Build JS bundle
        run: cd crates/bekoedit-app/js && npm ci && node build.mjs
      - name: Build desktop app
        run: cargo build -p bekoedit --release
      - name: Smoke test (headless launch, exit 0 within 10 s)
        run: |
          # Verify the binary starts and exits cleanly in a headless display.
          # Uses xvfb-run to provide a virtual framebuffer on CI.
          timeout 10 xvfb-run -a ./target/release/bekoedit --headless-smoke
      - name: Check binary links and size
        run: |
          file target/release/bekoedit
          du -sh target/release/bekoedit
